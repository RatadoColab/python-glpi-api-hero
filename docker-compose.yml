services:
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  consumer:
    build: .
    command: python microservices/consumer.py
    restart: on-failure
    depends_on:
      rabbitmq:
        condition: service_healthy
    env_file: .env

  producer:
    build: .
    command: python microservices/producer.py
    restart: "no"
    depends_on:
      rabbitmq:
        condition: service_healthy
    env_file: .env
    profiles:
      - producer

volumes:
  rabbitmq_data:
